{% extends 'base.html' %}
{% block titulo %} · {{ titulo }}{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">{{ titulo }}</h2>
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            {{ form.nombre }}
          </div>
          <div class="mb-3">
            <label class="form-label">Categoría</label>
            {{ form.categoria }}
          </div>
          <div class="mb-3">
            <label class="form-label">Precio</label>
            {{ form.precio }}
          </div>
          <button class="btn btn-primary">Guardar</button>
          <a href="{% url 'producto_lista' %}" class="btn btn-link">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
