{% extends 'base.html' %}
{% block titulo %} · Borrar producto{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-body">
        <h4 class="card-title">¿Borrar este producto?</h4>
        <p>Estás por borrar <strong>{{ producto.nombre }}</strong>. Esta acción no se puede deshacer.</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger">Sí, borrar</button>
          <a href="{% url 'producto_lista' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
